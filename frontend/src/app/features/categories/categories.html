<div class="p-6 max-w-5xl mx-auto">
  <div class="flex justify-between items-center mb-8">
    <div>
      <h1 class="text-3xl font-black text-slate-900 tracking-tight">Gestão de Categorias</h1>
      <p class="text-slate-500 mt-1">Organize suas tarefas com cores e nomes personalizados.</p>
    </div>
    
    <button mat-flat-button color="primary" class="!rounded-xl !px-6 !py-6" (click)="openForm()">
      <div class="flex items-center">
        <mat-icon class="mr-2">add</mat-icon>
        <span class="font-bold uppercase tracking-wider text-xs">Nova Categoria</span>
      </div>
    </button>
  </div>

  <div class="bg-white rounded-3xl border border-slate-100 shadow-sm overflow-hidden">
    <table mat-table [dataSource]="categories()" class="w-full">
      
      <!-- Color Column -->
      <ng-container matColumnDef="color">
        <th mat-header-cell *matHeaderCellDef class="!bg-slate-50/50 !text-slate-400 !font-bold !text-[10px] !uppercase !tracking-widest !py-4">Cor</th>
        <td mat-cell *matCellDef="let cat" class="!py-4">
          <div class="w-4 h-4 rounded-full shadow-sm border border-slate-100" [style.background-color]="cat.color"></div>
        </td>
      </ng-container>

      <!-- Name Column -->
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef class="!bg-slate-50/50 !text-slate-400 !font-bold !text-[10px] !uppercase !tracking-widest !py-4">Nome</th>
        <td mat-cell *matCellDef="let cat" class="!py-4">
          <span class="font-bold text-slate-700">{{cat.name}}</span>
        </td>
      </ng-container>

      <!-- Task Count Column -->
      <ng-container matColumnDef="taskCount">
        <th mat-header-cell *matHeaderCellDef class="!bg-slate-50/50 !text-slate-400 !font-bold !text-[10px] !uppercase !tracking-widest !py-4 text-center">Tarefas</th>
        <td mat-cell *matCellDef="let cat" class="!py-4 text-center">
          <span class="bg-slate-100 text-slate-500 text-[10px] font-black px-2 py-0.5 rounded-lg">
            {{cat.taskCount || 0}}
          </span>
        </td>
      </ng-container>

      <!-- Actions Column -->
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef class="!bg-slate-50/50 !text-slate-400 !font-bold !text-[10px] !uppercase !tracking-widest !py-4 text-right pr-6">Ações</th>
        <td mat-cell *matCellDef="let cat" class="!py-4 text-right pr-6">
          <button mat-icon-button color="primary" (click)="openForm(cat)" matTooltip="Editar">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button color="warn" (click)="deleteCategory(cat)" matTooltip="Excluir">
            <mat-icon>delete_outline</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;" class="hover:bg-slate-50/50 transition-colors"></tr>

      <!-- Row shown when there is no matching data. -->
      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell p-8 text-center text-slate-400" colspan="4">
          Nenhuma categoria encontrada. Crie uma para começar!
        </td>
      </tr>
    </table>
  </div>
</div>
