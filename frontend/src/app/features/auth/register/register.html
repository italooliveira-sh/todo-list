<app-auth-layout
  title="Criar Conta"
  subtitle="Junte-se ao ToDo Pro e<br>organize sua vida"
  icon="person_add"
  iconRotation="rotate-6"
  cardMaxWidth="max-w-lg"
>
  <form authForm [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="flex flex-col gap-6">
    
    <!-- Campo Nome -->
    <div class="space-y-1">
      <mat-form-field appearance="outline" class="w-full !mb-0">
        <mat-label>Nome Completo</mat-label>
        <input matInput formControlName="name" placeholder="Como quer ser chamado?">
        <mat-icon matSuffix class="!text-slate-300 !w-6 !h-6 flex items-center justify-center overflow-visible">person</mat-icon>
        <mat-error *ngIf="registerForm.get('name')?.hasError('required')">Nome é obrigatório</mat-error>
        <mat-error *ngIf="registerForm.get('name')?.hasError('minlength')">Nome deve ter no mínimo 3 caracteres</mat-error>
      </mat-form-field>
    </div>

    <!-- Campo E-mail -->
    <div class="space-y-1">
      <mat-form-field appearance="outline" class="w-full !mb-0">
        <mat-label>E-mail</mat-label>
        <input matInput formControlName="email" type="email" placeholder="seu@email.com">
        <mat-icon matSuffix class="!text-slate-300 !w-6 !h-6 flex items-center justify-center overflow-visible">mail</mat-icon>
        <mat-error *ngIf="registerForm.get('email')?.hasError('email')">E-mail inválido</mat-error>
        <mat-error *ngIf="registerForm.get('email')?.hasError('required')">E-mail é obrigatório</mat-error>
      </mat-form-field>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
      <!-- Campo Senha -->
      <div class="space-y-1">
        <mat-form-field appearance="outline" class="w-full !mb-0">
          <mat-label>Senha</mat-label>
          <input matInput formControlName="password" [type]="hidePassword ? 'password' : 'text'">
          <button type="button" mat-icon-button matSuffix (click)="hidePassword = !hidePassword" class="!text-slate-300">
            <mat-icon class="!w-6 !h-6 flex items-center justify-center overflow-visible">{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
          <mat-error *ngIf="registerForm.get('password')?.hasError('required')">Senha é obrigatória</mat-error>
          <mat-error *ngIf="registerForm.get('password')?.hasError('minlength')">Mínimo de 6 caracteres</mat-error>
        </mat-form-field>
      </div>

      <!-- Campo Confirmar Senha -->
      <div class="space-y-1">
        <mat-form-field appearance="outline" class="w-full !mb-0">
          <mat-label>Confirmar Senha</mat-label>
          <input matInput formControlName="confirmPassword" [type]="hideConfirmPassword ? 'password' : 'text'">
          <button type="button" mat-icon-button matSuffix (click)="hideConfirmPassword = !hideConfirmPassword" class="!text-slate-300">
            <mat-icon class="!w-6 !h-6 flex items-center justify-center overflow-visible">{{ hideConfirmPassword ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
          <mat-error *ngIf="registerForm.get('confirmPassword')?.hasError('required')">Confirmação é obrigatória</mat-error>
          <mat-error *ngIf="registerForm.hasError('passwordMismatch')">As senhas não conferem</mat-error>
        </mat-form-field>
      </div>
    </div>

    <button mat-flat-button type="submit" 
            class="w-full !h-16 !text-lg !font-bold !bg-pink-600 !text-white !rounded-2xl shadow-lg shadow-pink-200 hover:!bg-pink-700 hover:shadow-pink-300 transition-all transform hover:-translate-y-1 active:scale-95 disabled:!bg-slate-200 flex items-center justify-center gap-2" 
            [disabled]="registerForm.invalid">
      <span>Criar minha conta</span>
      <mat-icon class="!w-6 !h-6 !text-2xl flex items-center justify-center overflow-visible">arrow_forward</mat-icon>
    </button>
  </form>

  <div authFooter class="flex flex-col items-center gap-4">
    <div class="w-full h-px bg-slate-100"></div>
    
    <p class="text-slate-500 font-medium text-sm">
      Já tem uma conta? 
      <a routerLink="/login" class="text-indigo-600 font-bold hover:text-indigo-800 transition-colors ml-1">
        Fazer login agora
      </a>
    </p>
  </div>
</app-auth-layout>
