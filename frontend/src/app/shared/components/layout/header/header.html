<header class="h-16 w-full bg-white/80 backdrop-blur-md border-b border-slate-200 sticky top-0 z-50 px-4 md:px-8 flex justify-between items-center shadow-sm">
  <div class="flex items-center gap-2">
    <!-- Botão de Menu para Expandir/Recolher Sidebar (Visível em todas as telas) -->
    <button mat-icon-button (click)="onToggleMenu()">
      <mat-icon>menu</mat-icon>
    </button>

    <div class="flex items-center gap-2 text-indigo-900 font-bold text-xl cursor-pointer hover:opacity-80 transition-opacity" (click)="goToDashboard()">
      <mat-icon class="scale-110">task_alt</mat-icon>
      <span class="tracking-tight hidden sm:inline">ToDo Pro</span>
    </div>
  </div>

  <div class="flex items-center gap-2 md:gap-4">
    <span class="text-slate-600 text-sm font-medium hidden lg:block">Olá, {{ userName }}</span>
    <div class="w-9 h-9 rounded-full bg-indigo-100 border border-indigo-200 flex items-center justify-center text-indigo-700 font-bold text-sm shadow-inner">
      {{ userInitials }}
    </div>
    <button mat-icon-button color="warn" (click)="logout()">
      <mat-icon>logout</mat-icon>
    </button>
  </div>
</header>
