<aside class="h-full bg-white border-r border-slate-200 flex flex-col py-6 sticky top-16 transition-all duration-300 overflow-hidden"
       [class.w-64]="!isCollapsed()"
       [class.w-20]="isCollapsed()">
  
  <div class="mb-8 transition-all duration-300"
       [class.px-4]="!isCollapsed()"
       [class.px-2]="isCollapsed()">
    
    <div class="flex flex-col gap-1">
      <!-- Link para Todas as Tarefas (Limpa filtro de categoria) -->
      <button mat-button routerLink="/dashboard" [queryParams]="{}" routerLinkActive="active-link" [routerLinkActiveOptions]="{exact: true}"
              class="w-full !rounded-xl !transition-all !duration-200 !px-4 !py-7 sidebar-link"
              [class.!text-center]="isCollapsed()">
        <div class="flex items-center" [class.justify-center]="isCollapsed()">
          <mat-icon [class.mr-3]="!isCollapsed()" class="!w-5 !h-5 !text-xl flex items-center justify-center">dashboard</mat-icon>
          <span *ngIf="!isCollapsed()" class="text-sm font-bold">Todas Tarefas</span>
        </div>
      </button>

      <div class="h-px bg-slate-100 my-4 mx-4"></div>

      <div class="flex items-center justify-between mb-4 mt-2 ml-4 mr-4" *ngIf="!isCollapsed()">
        <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em]">
          Categorias
        </h3>
        <button mat-icon-button routerLink="/categories" class="!w-6 !h-6 !min-w-0 !p-0 !text-slate-400 hover:!text-indigo-600 transition-colors">
          <mat-icon class="!text-sm !w-4 !h-4 flex items-center justify-center">settings</mat-icon>
        </button>
      </div>
      
      <!-- Categorias Dinâmicas com Filtro -->
      <button *ngFor="let cat of categories()" 
              mat-button 
              [routerLink]="['/dashboard']"
              [queryParams]="{ categoryId: cat.id }"
              routerLinkActive="active-link"
              class="w-full !rounded-xl !transition-all !duration-200 !px-4 !py-7 sidebar-link">
        <div class="flex items-center w-full" [class.justify-center]="isCollapsed()">
          <div class="w-2.5 h-2.5 rounded-full shrink-0 shadow-sm" 
               [style.background-color]="cat.color"
               [class.mr-4]="!isCollapsed()">
          </div>
          
          <span *ngIf="!isCollapsed()" class="text-sm font-semibold truncate flex-1 text-left">
            {{ cat.name }}
          </span>
          
          <span *ngIf="!isCollapsed() && cat.taskCount" class="ml-2 text-[10px] font-black bg-slate-100 px-2 py-0.5 rounded-lg text-slate-500">
            {{ cat.taskCount }}
          </span>
        </div>
      </button>

      <button mat-button 
              (click)="openNewCategoryForm()"
              class="w-full !rounded-xl !text-slate-400 hover:!bg-slate-50 !px-4 !py-7 !mt-4 !border !border-dashed !border-slate-200"
              [class.!px-0]="isCollapsed()">
        <div class="flex items-center justify-center w-full">
          <mat-icon class="!w-5 !h-5 !text-xl flex items-center justify-center" [class.mr-2]="!isCollapsed()">add</mat-icon>
          <span *ngIf="!isCollapsed()" class="text-xs font-black uppercase tracking-wider">Nova Categoria</span>
        </div>
      </button>
    </div>
  </div>

  <div class="mt-auto border-t border-slate-100 pt-6 transition-all duration-300"
       [class.px-4]="!isCollapsed()"
       [class.px-2]="isCollapsed()">
    <div class="bg-indigo-900/5 rounded-2xl p-4 flex flex-col items-center" [class.items-start]="!isCollapsed()">
      <p *ngIf="!isCollapsed()" class="text-[9px] font-bold text-indigo-900 uppercase mb-2 tracking-tighter truncate">Projeto Atual</p>
      <div class="flex items-center gap-2">
        <div class="w-2 h-2 rounded-full bg-indigo-500 animate-pulse min-w-2"></div>
        <span *ngIf="!isCollapsed()" class="text-[10px] font-mono text-indigo-900 truncate">TODO-PRO v1.0</span>
      </div>
    </div>
  </div>
</aside>
