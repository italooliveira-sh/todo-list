<div class="flex flex-col h-screen bg-slate-50 relative overflow-hidden">
  <!-- Header Fixo no Topo -->
  <app-header (toggleMenu)="toggleSidebar()" class="shrink-0"></app-header>

  <div class="flex flex-1 overflow-hidden relative">
    
    <!-- Backdrop (Mobile apenas) -->
    <div *ngIf="isMobile() && isSidebarOpen()" 
         (click)="closeSidebar()"
         class="fixed inset-0 bg-slate-900/40 z-40 backdrop-blur-sm animate-in fade-in duration-300">
    </div>

    <!-- Sidebar Adaptativa -->
    <app-sidebar class="z-50 transition-all duration-300 h-full"
                 [class.fixed]="isMobile()"
                 [class.md:relative]="true"
                 [class.-translate-x-full]="isMobile() && !isSidebarOpen()"
                 [class.translate-x-0]="!isMobile() || isSidebarOpen()"
                 [isCollapsed]="!isMobile() && !isSidebarOpen()">
    </app-sidebar>

    <!-- Área de Conteúdo + Footer -->
    <div class="flex flex-col flex-1 overflow-y-auto w-full">
      <main class="flex-grow w-full">
        <router-outlet></router-outlet>
      </main>
      <app-footer class="shrink-0"></app-footer>
    </div>
  </div>
</div>
