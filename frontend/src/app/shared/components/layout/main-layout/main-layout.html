<div class="flex flex-col min-h-screen bg-slate-50 relative overflow-x-hidden">
  <!-- Header Fixo no Topo -->
  <app-header (toggleMenu)="toggleSidebar()"></app-header>

  <div class="flex flex-1 overflow-hidden relative">
    
    <!-- Backdrop (Fundo escuro no mobile quando a sidebar está aberta) -->
    <div *ngIf="isSidebarOpen()" 
         (click)="closeSidebar()"
         class="fixed inset-0 bg-slate-900/40 z-40 backdrop-blur-sm md:hidden animate-in fade-in duration-300">
    </div>

    <!-- Sidebar Adaptativa -->
    <app-sidebar class="z-50 transition-all duration-300 h-full fixed md:relative"
                 [class.-translate-x-full]="!isSidebarOpen()"
                 [class.translate-x-0]="isSidebarOpen()"
                 [isCollapsed]="false"
                 [class.md:translate-x-0]="true"
                 [class.md:!relative]="true">
    </app-sidebar>

    <!-- Área de Conteúdo + Footer -->
    <div class="flex flex-col flex-1 overflow-y-auto w-full">
      <main class="flex-grow w-full overflow-x-hidden">
        <router-outlet></router-outlet>
      </main>
      <app-footer></app-footer>
    </div>
  </div>
</div>
