<div class="min-h-screen flex items-center justify-center bg-slate-50 relative overflow-hidden">
  <!-- Elementos de Fundo Estilizados -->
  <div class="absolute -top-24 -left-24 w-96 h-96 bg-indigo-100 rounded-full blur-3xl opacity-40 animate-pulse"></div>
  <div class="absolute -bottom-24 -right-24 w-96 h-96 bg-pink-100 rounded-full blur-3xl opacity-40 animate-pulse"></div>

  <mat-card [class]="'w-full ' + cardMaxWidth + ' !p-8 sm:!p-12 !rounded-[2.5rem] shadow-2xl border border-white/50 z-10 mx-4 backdrop-blur-sm bg-white/90'">
    <mat-card-header class="flex justify-center mb-10">
      <div class="flex flex-col items-center text-center">
        <!-- Logo/Ícone com Gradiente -->
        <div [class]="'w-20 h-20 bg-gradient-to-br from-indigo-900 to-purple-800 text-white rounded-[1.5rem] flex items-center justify-center shadow-xl mb-6 transform transition-transform duration-300 ' + iconRotation + ' hover:rotate-0'">
          <mat-icon class="!text-4xl !w-10 !h-10 flex items-center justify-center overflow-visible">{{ icon }}</mat-icon>
        </div>
        
        <mat-card-title class="!text-4xl !font-black !text-indigo-950 !tracking-tight mb-2">
          {{ title }}
        </mat-card-title>
        <mat-card-subtitle class="!text-slate-400 !text-[11px] !font-black !uppercase !tracking-[0.2em] !leading-relaxed">
          <span [innerHTML]="subtitle"></span>
        </mat-card-subtitle>
      </div>
    </mat-card-header>

    <ng-content select="[authForm]"></ng-content>

    <div class="mt-6">
      <ng-content select="[authFooter]"></ng-content>
    </div>
  </mat-card>

  <!-- Rodapé discreto -->
  <p class="absolute bottom-8 text-slate-400 text-xs font-medium tracking-wide">
    © 2026 ToDo Pro - Organização e Produtividade
  </p>
</div>
