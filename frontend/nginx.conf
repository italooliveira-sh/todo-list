server {
    listen 80;
    server_name localhost;

    # Onde os arquivos do Angular (HTML/JS/CSS) estarão no container
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        
        # Tenta carregar o arquivo ou pasta real. 
        # Se não existir, entrega o index.html (essencial para o Angular Router)
        try_files $uri $uri/ /index.html;
    }

    # Encaminha chamadas de API para o container do backend
    # Isso ajuda a evitar problemas de CORS em produção
    location /api {
        proxy_pass http://backend:8080/api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
