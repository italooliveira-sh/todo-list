spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/todopro_db
    username: todopro_user
    password: todopro_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate # Com Flyway, o Hibernate APENAS valida
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.flywaydb: DEBUG